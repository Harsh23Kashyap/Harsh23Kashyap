name: Generate README assets

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Harsh23Kashyap&show_icons=true&count_private=true&hide_border=true&theme=react&include_all_commits=true&title_color=E8C547&icon_color=E8C547&text_color=E6EDF3&bg_color=0D1117
          path: dist/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Harsh23Kashyap&layout=compact&hide_border=true&theme=react&title_color=E8C547&text_color=E6EDF3&bg_color=0D1117
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card
        uses: muhammad-fiaz/github-readme-streak-stats@v1.0.1
        with:
          USERNAME: Harsh23Kashyap
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: dark
          OUTPUT_PATH: dist/github-streak.svg
          HIDE_BORDER: "true"
          BACKGROUND: "0D1117"
          RING: "E8C547"
          FIRE: "E8C547"
          CURR_STREAK_LABEL: "E8C547"

      - name: Fix streak SVG hex colors
        run: |
          python3 <<'PY'
          import re, pathlib
          path = pathlib.Path("dist/github-streak.svg")
          text = path.read_text()

          def fix(match):
              attr, value = match.group(1), match.group(2)
              if value.startswith("#") or value.lower() in {"none", "white", "black", "transparent"} or value.startswith("url"):
                  return match.group(0)
              return f"{attr}='#{value}'"

          text = re.sub(r"(fill|stroke)='([0-9A-Fa-f]{3,8})'", fix, text)
          path.write_text(text)
          PY

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: Harsh23Kashyap
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
